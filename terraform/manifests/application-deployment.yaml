# Catalog Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: retail-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
      - name: catalog-service
        image: public.ecr.aws/docker/library/node:18-alpine
        command: ["sh", "-c", "echo 'Catalog service running'; sleep 3600"]
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: retail-store
spec:
  selector:
    app: catalog-service
  ports:
  - port: 3000
    targetPort: 3000

# Orders Service
apiVersion: apps/v1
