apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-service
  namespace: retail-store
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui-service
  template:
    metadata:
      labels:
        app: ui-service
    spec:
      containers:
      - name: ui-service
        image: nginx:alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: retail-store
spec:
  type: LoadBalancer
  selector:
    app: ui-service
  ports:
  - port: 80
    targetPort: 80
